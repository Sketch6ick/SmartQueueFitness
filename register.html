<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครสมาชิก - Fitness Center</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background-color: #22c55e; color: white; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #16a34a; }
        .link { margin-top: 1rem; font-size: 0.9rem; color: #64748b; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>สมัครสมาชิก</h2>
        <input type="text" id="reg_username" placeholder="ชื่อผู้ใช้งาน">
        <input type="email" id="reg_email" placeholder="อีเมล">
        <input type="password" id="reg_password" placeholder="รหัสผ่าน">
        <button onclick="register()">ยืนยันการสมัคร</button>
        <div class="link">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('reg_username').value;
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;

            if(!username || !password) return alert("กรุณากรอกข้อมูลให้ครบ");

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('สมัครสมาชิกสำเร็จ!');
                    window.location.href = 'login.html';
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (เปิด node server.js หรือยัง?)");
            }
        }
    </script>
</body>
</html>
