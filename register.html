<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Fitness Center</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; color: #475569; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 0.8rem; background-color: #10b981; color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 1rem; }
        button:hover { background-color: #059669; }
        .footer-links { margin-top: 1.2rem; text-align: center; font-size: 0.875rem; color: #64748b; }
        a { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="register-card">
    <h2>สมัครสมาชิก</h2>
    
    <div class="input-group">
        <label>ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" placeholder="ตั้งชื่อผู้ใช้">
    </div>

    <div class="input-group">
        <label>อีเมล (Email)</label>
        <input type="email" id="email" placeholder="example@mail.com">
    </div>

    <div class="input-group">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="password" placeholder="ตั้งรหัสผ่าน">
    </div>

    <button onclick="handleRegister()">ลงทะเบียน</button>

    <div class="footer-links">
        เป็นสมาชิกอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
    </div>
</div>

<script>
    async function handleRegister() {
        // 1. ดึงค่าจาก Input
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // 2. ตรวจสอบความว่างเปล่า
        if (!username || !email || !password) {
            return alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");
        }

        try {
            // 3. ส่งข้อมูลไปที่ Backend Server (Port 3000)
            const response = await fetch('http://localhost:3000/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    username: username, 
                    email: email, 
                    password: password 
                })
            });

            const data = await response.json();

            // 4. ตรวจสอบผลลัพธ์
            if (response.ok) {
                alert("✅ สมัครสมาชิกสำเร็จ!");
                window.location.href = 'login.html'; // ส่งไปหน้า Login
            } else {
                // แสดง Error ที่ส่งมาจาก Server (เช่น ชื่อผู้ใช้ซ้ำ)
                alert("❌ " + (data.message || "สมัครสมาชิกไม่สำเร็จ"));
            }

        } catch (error) {
            console.error("Fetch Error:", error);
            alert("⚠️ ติดต่อ Server ไม่ได้! \n1. ตรวจสอบว่ารัน 'node server.js' อยู่ไหม \n2. ตรวจสอบว่าใน Terminal ไม่มี Error สีแดง");
        }
    }
</script>

</body>
</html>
