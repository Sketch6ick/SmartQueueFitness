<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สมัครสมาชิก - Fitness Center</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #1e293b; }
        input { width: 100%; padding: 0.8rem; margin: 10px 0; border: 1px solid #ddd; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: #22c55e; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .link { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>สร้างบัญชีใหม่</h2>
        <input type="text" id="reg_username" placeholder="ชื่อผู้ใช้งาน">
        <input type="email" id="reg_email" placeholder="อีเมล">
        <input type="password" id="reg_password" placeholder="รหัสผ่าน">
        <button onclick="register()">สมัครสมาชิก</button>
        <div class="link">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('reg_username').value;
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;

            if(!username || !password) return alert("กรุณากรอกข้อมูลให้ครบ");

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (res.ok) {
                    alert('สมัครสมาชิกสำเร็จ! ลองไป Login ดูนะ');
                    window.location.href = 'login.html';
                } else {
                    const data = await res.json();
                    alert(data.message);
                }
            } catch (err) {
                alert("ลืมรัน node server.js หรือเปล่าครับ?");
            }
        }
    </script>
</body>
</html>
