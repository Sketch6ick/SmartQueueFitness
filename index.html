<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | จองเครื่องเล่นออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-dumbbell text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight text-indigo-900">GYM<span class="text-indigo-500">FLOW</span></span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="hidden md:block text-sm font-medium text-slate-600 bg-slate-100 px-3 py-1 rounded-full"></span>
                <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-900 text-white py-16 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">จองคิวเครื่องเล่น ไม่ต้องรอนาน</h1>
            <p class="text-indigo-200 text-lg max-w-2xl mx-auto">ยกระดับการออกกำลังกายของคุณด้วยระบบจองอัจฉริยะ เลือกเครื่องเล่นที่ชอบ ในเวลาที่คุณต้องการ</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-2">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-800">เครื่องเล่นว่างตอนนี้</h2>
                <div class="flex gap-2">
                    <span class="flex items-center gap-1 text-xs font-medium text-slate-500"><span class="w-3 h-3 bg-green-500 rounded-full"></span> ว่าง</span>
                    <span class="flex items-center gap-1 text-xs font-medium text-slate-500"><span class="w-3 h-3 bg-red-500 rounded-full"></span> ไม่ว่าง</span>
                </div>
            </div>
            
            <div id="equipment-list" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 sticky top-28">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-calendar-check text-indigo-500"></i> รายละเอียดการจอง
                </h3>
                
                <div class="space-y-6">
                    <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-indigo-400">เครื่องเล่นที่เลือก</label>
                        <p id="selected-item-name" class="text-lg font-bold text-indigo-900">กรุณาเลือกเครื่องเล่น...</p>
                        <input type="hidden" id="selected-item-id">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">วัน/เวลาเริ่มต้น</label>
                        <input type="datetime-local" id="book-start" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">วัน/เวลาสิ้นสุด</label>
                        <input type="datetime-local" id="book-end" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <button onclick="handleBooking()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-1 active:scale-95">
                        ยืนยันการจองคิว
                    </button>
                    
                    <p class="text-center text-xs text-slate-400 font-light italic">** กรุณามาก่อนเวลาจอง 5 นาที</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // เช็คสถานะ Login
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';
        document.getElementById('user-display').innerText = `คุณคือ: ${user.username}`;

        // โหลดข้อมูลเครื่องเล่น
        async function fetchEquipments() {
            try {
                const res = await fetch('http://localhost:3000/api/equipments');
                const data = await res.json();
                const container = document.getElementById('equipment-list');
                
                container.innerHTML = data.map(item => `
                    <div onclick="selectItem(${item.id}, '${item.name}')" class="group bg-white p-5 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all cursor-pointer relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-slate-100 p-3 rounded-2xl group-hover:bg-indigo-100 transition-colors">
                                <i class="fas fa-running text-2xl text-slate-400 group-hover:text-indigo-600"></i>
                            </div>
                            <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${item.status === 'available' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                ${item.status}
                            </span>
                        </div>
                        <h4 class="text-lg font-bold text-slate-800">${item.name}</h4>
                        <p class="text-sm text-slate-400">${item.type}</p>
                        <div class="absolute bottom-0 right-0 w-12 h-12 bg-indigo-50 rounded-tl-3xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-plus text-indigo-400"></i>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("เชื่อมต่อ Backend ไม่ได้ (Localhost)");
            }
        }

        function selectItem(id, name) {
            document.getElementById('selected-item-id').value = id;
            document.getElementById('selected-item-name').innerText = name;
        }

        async function handleBooking() {
            const eqId = document.getElementById('selected-item-id').value;
            if(!eqId) return alert("เลือกเครื่องเล่นก่อนครับ!");

            const payload = {
                user_id: user.id,
                equipment_id: eqId,
                start_time: document.getElementById('book-start').value,
                end_time: document.getElementById('book-end').value
            };

            const res = await fetch('http://localhost:3000/api/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const result = await res.json();
            alert(result.message);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        fetchEquipments();
    </script>
</body>
</html>
