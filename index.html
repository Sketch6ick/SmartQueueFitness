<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --light: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: white; color: var(--primary); }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 8%; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: #334155; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .btn-signin { background: var(--primary); color: white; padding: 8px 22px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; }

        /* Hero Section */
        .hero { height: 450px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 8%; color: white; }
        .hero-text h1 { font-size: 2.8rem; line-height: 1.2; margin-bottom: 15px; }

        /* Machine Cards */
        .container { padding: 60px 8%; }
        .section-title { font-size: 1.5rem; margin-bottom: 30px; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: #f1f5f9; border-radius: 15px; overflow: hidden; transition: 0.3s; position: relative; border: 1px solid #e2e8f0; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: #22c55e; color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; }
        .card-content { padding: 20px; text-align: center; }
        .card-content h3 { margin-bottom: 15px; font-size: 1.1rem; }
        .btn-booking { width: 100%; padding: 12px; background: #0f172a; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-booking:hover { background: #1e293b; }

        /* Contact Section */
        .contact-section { background: white; padding: 60px 8%; border-top: 1px solid #eee; }
        .contact-info { margin-top: 20px; }
        .contact-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #334155; }
        .contact-item i { color: var(--accent); width: 20px; }

        /* Modal / Login */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; position: relative; }
        .modal-content h2 { margin-bottom: 25px; font-size: 1.8rem; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; margin-top: 5px; }
        .btn-continue { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        
        .show { display: flex !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">💪 SmartQueue</div>
    <ul class="nav-links">
        <li><a onclick="location.reload()">หน้าแรก</a></li>
        <li><a href="#contact">ติดต่อเรา</a></li>
    </ul>
    <div id="authArea">
        <button class="btn-signin" onclick="openModal('loginModal')">Sign In</button>
    </div>
</nav>

<div class="hero">
    <div class="hero-text">
        <h1>ยกระดับการออกกำลังกาย<br>ในแบบอัจฉริยะ</h1>
    </div>
</div>

<div class="container">
    <h2 class="section-title">เครื่องเล่นที่พร้อมใช้งาน</h2>
    <div class="grid">
        <div class="card">
            <span class="badge">Available</span>
            <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=500">
            <div class="card-content">
                <h3>Treadmill Elite-X</h3>
                <button class="btn-booking" onclick="handleBooking('Treadmill Elite-X')">จองเครื่องนี้</button>
            </div>
        </div>
        <div class="card">
            <span class="badge">Available</span>
            <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500">
            <div class="card-content">
                <h3>Smith Machine</h3>
                <button class="btn-booking" onclick="handleBooking('Smith Machine')">จองเครื่องนี้</button>
            </div>
        </div>
    </div>
</div>

<div class="contact-section" id="contact">
    <h2 class="section-title">ติดต่อเรา</h2>
    <div class="contact-info">
        <div class="contact-item">
            <i class="fab fa-facebook"></i>
            <span>Facebook: SmartQueueFN</span>
        </div>
        <div class="contact-item">
            <i class="fas fa-phone"></i>
            <span>Tel: 0890912425</span>
        </div>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:25px; top:20px; cursor:pointer; font-size:1.2rem;" onclick="closeModal('loginModal')">✕</span>
        <h2>Sign in to SmartQueue</h2>
        <div class="input-group">
            <input type="text" id="userIn" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="passIn" placeholder="Password">
        </div>
        <button class="btn-continue" onclick="loginAction()">Continue</button>
    </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function loginAction() {
        const user = document.getElementById('userIn').value;
        const pass = document.getElementById('passIn').value;
        
        if(user === "" || pass === "") {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            return;
        }
        
        localStorage.setItem('fitness_user', user);
        updateUserUI();
        closeModal('loginModal');
    }

    function updateUserUI() {
        const user = localStorage.getItem('fitness_user');
        if(user) {
            document.getElementById('authArea').innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="background:#e2e8f0; padding:5px 12px; border-radius:20px; font-size:0.85rem;">
                        <i class="fas fa-user-circle"></i> ${user}
                    </div>
                    <button onclick="logout()" style="border:none; background:none; color:#ef4444; cursor:pointer; font-size:0.85rem;">Logout</button>
                </div>
            `;
        }
    }

    function handleBooking(name) {
        if(!localStorage.getItem('fitness_user')) {
            alert("กรุณาเข้าสู่ระบบก่อนจองเครื่องเล่น");
            openModal('loginModal');
            return;
        }
        alert(`จอง ${name} สำเร็จ! กรุณาตรวจสอบคิวที่หน้าประวัติ`);
    }

    function logout() {
        localStorage.removeItem('fitness_user');
        location.reload();
    }

    window.onload = updateUserUI;
</script>

</body>
</html>
