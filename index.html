<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --navy: #0f172a; --slate: #64748b; --light: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--light); color: var(--navy); }

        /* --- Navigation --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 8%; background: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); cursor: pointer; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--slate); cursor: pointer; }

        /* Account & Dropdown */
        .auth-btns { position: relative; }
        .btn-user { background: var(--navy); color: white; padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .dropdown-menu { display: none; position: absolute; top: 110%; right: 0; background: white; min-width: 200px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; z-index: 1001; }
        .dropdown-menu.active { display: block; }
        .dropdown-menu a { display: block; padding: 12px 20px; color: var(--navy); text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #f1f5f9; }
        .dropdown-menu a:hover { background: var(--light); }

        /* --- Hero --- */
        .hero { height: 450px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1600'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 8%; color: white; }

        /* --- Modals --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; position: relative; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 5px; outline: none; }
        .btn-continue { width: 100%; padding: 15px; background: var(--navy); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .switch-text { margin-top: 20px; font-size: 0.85rem; color: var(--slate); }
        .switch-text span { color: var(--primary); font-weight: 600; cursor: pointer; }

        /* --- Contact --- */
        #contact-section { padding: 80px 8%; background: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo">💪 SmartQueue</div>
    <ul class="nav-links">
        <li><a onclick="location.reload()">หน้าแรก</a></li>
        <li><a onclick="document.getElementById('contact-section').scrollIntoView({behavior:'smooth'})">ติดต่อเรา</a></li>
    </ul>
    <div class="auth-btns">
        <div id="loggedOut">
            <button class="btn-user" onclick="openModal('loginModal')">Sign In</button>
        </div>
        <div id="loggedIn" style="display: none;">
            <button class="btn-user" onclick="toggleDropdown()">
                <i class="fas fa-user-circle"></i> <span id="displayUser">User</span> <i class="fas fa-chevron-down"></i>
            </button>
            <div id="userDropdown" class="dropdown-menu">
                <a onclick="alert('ไปหน้าตั้งค่าบัญชี...')"><i class="fas fa-cog"></i> ตั้งค่าบัญชี</a>
                <a onclick="alert('ประวัติการจอง...')"><i class="fas fa-calendar-check"></i> ประวัติการจอง</a>
                <a onclick="handleLogout()" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
            </div>
        </div>
    </div>
</nav>

<div class="hero">
    <h1>ยกระดับการออกกำลังกาย<br>ในแบบอัจฉริยะ</h1>
</div>

<section id="contact-section">
    <h2>ติดต่อเรา</h2>
    <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
        <div>
            <p style="margin-bottom: 15px;"><i class="fab fa-facebook" style="color:#1877f2"></i> <strong>Facebook:</strong> SmartQueueFN</p>
            <p><i class="fas fa-phone" style="color:#22c55e"></i> <strong>Tel:</strong> 0890912425</p>
        </div>
    </div>
</section>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; cursor:pointer;" onclick="closeModal('loginModal')">✕</span>
        <h2 style="margin-bottom: 25px;">Sign in to SmartQueue</h2>
        <div class="input-group"><input type="text" id="loginU" placeholder="Username"></div>
        <div class="input-group"><input type="password" id="loginP" placeholder="Password"></div>
        <button class="btn-continue" onclick="doLogin()">Continue</button>
        <p class="switch-text">Don't have an account? <span onclick="openModal('regModal')">สมัครสมาชิกฟรี</span></p>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; cursor:pointer;" onclick="closeModal('regModal')">✕</span>
        <h2 style="margin-bottom: 25px;">Create Account</h2>
        <div class="input-group"><input type="text" id="regU" placeholder="เลือก Username"></div>
        <div class="input-group"><input type="password" id="regP" placeholder="ตั้งรหัสผ่าน"></div>
        <button class="btn-continue" onclick="doRegister()" style="background: var(--primary);">สมัครสมาชิก</button>
        <p class="switch-text">มีบัญชีอยู่แล้ว? <span onclick="openModal('loginModal')">เข้าสู่ระบบ</span></p>
    </div>
</div>

<script>
    function openModal(id) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('active'); }

    async function doLogin() {
        const u = document.getElementById('loginU').value;
        const p = document.getElementById('loginP').value;
        try {
            const res = await fetch('http://localhost:3000/api/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(res.ok) { sessionStorage.setItem('user', JSON.stringify(data.user)); location.reload(); }
            else alert(data.message);
        } catch(e) { alert("กรุณารัน server.js ก่อนครับ"); }
    }

    async function doRegister() {
        const u = document.getElementById('regU').value;
        const p = document.getElementById('regP').value;
        try {
            const res = await fetch('http://localhost:3000/api/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            if(res.ok) { alert("สมัครสำเร็จ! กรุณาล็อกอินครับ"); openModal('loginModal'); }
            else { const d = await res.json(); alert(d.message); }
        } catch(e) { alert("ระบบสมัครขัดข้อง"); }
    }

    function handleLogout() { sessionStorage.clear(); location.reload(); }

    window.onload = function() {
        const user = sessionStorage.getItem('user');
        if(user) {
            document.getElementById('loggedOut').style.display = 'none';
            document.getElementById('loggedIn').style.display = 'block';
            document.getElementById('displayUser').innerText = JSON.parse(user).username;
        }
    };
    
    // ปิด dropdown เมื่อคลิกที่อื่น
    window.onclick = function(e) {
        if (!e.target.closest('.auth-btns')) document.getElementById('userDropdown').classList.remove('active');
    }
</script>
</body>
</html>
