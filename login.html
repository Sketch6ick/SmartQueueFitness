<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | GymFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-8 text-slate-800">ยินดีต้อนรับ</h2>
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อผู้ใช้งาน</label>
                <input type="text" id="user" class="w-full p-3 border border-gray-300 rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">รหัสผ่าน</label>
                <input type="password" id="pass" class="w-full p-3 border border-gray-300 rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all">เข้าสู่ระบบ</button>
            <p class="text-center text-gray-500 text-sm">ทดสอบ: user: admin | pass: 1234</p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            const res = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('user', JSON.stringify(data.user)); // เก็บสถานะ Login
                alert('ยินดีต้อนรับคุณ ' + data.user.username);
                window.location.href = 'index.html'; // ไปหน้าจอง
            } else {
                alert('รหัสผ่านไม่ถูกต้อง!');
            }
        }
    </script>
</body>
</html>
