<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Login - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ส่วนตกแต่งหน้าตา (CSS) ให้ดูโปรเหมือนเว็บเพื่อน */
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); /* พื้นหลังไล่เฉดสีเข้มแบบ Premium */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05); /* กล่องแบบกระจกโปร่งแสง (Glassmorphism) */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h2 { color: #ffffff; margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label { color: #cbd5e1; display: block; margin-bottom: 8px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.15); }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #1d4ed8; transform: translateY(-2px); }

        .footer { margin-top: 20px; color: #94a3b8; font-size: 0.85rem; }
        .footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>FITNESS CENTER</h2>
    
    <div class="input-group">
        <label>ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" placeholder="ระบุชื่อผู้ใช้งาน">
    </div>

    <div class="input-group">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="password" placeholder="ระบุรหัสผ่าน">
    </div>

    <button onclick="handleLogin()">เข้าสู่ระบบ</button>

    <div class="footer">
        ยังไม่เป็นสมาชิก? <a href="register.html">สมัครสมาชิกที่นี่</a>
    </div>
</div>

<script>
    async function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if (!u || !p) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        try {
            // ยิงไปที่ Server ของคุณที่พอร์ต 3000
            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            const data = await response.json();

            if (response.ok) {
                // บันทึกข้อมูลลงเครื่องเพื่อใช้ในหน้าถัดไป
                sessionStorage.setItem('user', JSON.stringify(data.user));
                
                alert("ยินดีต้อนรับเข้าสู่ระบบ!");

                // ตรวจสอบสิทธิ์และเปลี่ยนหน้าไปยังไฟล์ที่มีในเครื่อง
                if (data.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert(data.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("⚠️ ติดต่อ Server ไม่ได้! ตรวจสอบว่ารัน 'node server.js' อยู่หรือไม่");
        }
    }
</script>

</body>
</html>
