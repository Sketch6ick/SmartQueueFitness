<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ติดต่อเรา - SmartQueue Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; }
        .contact-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; color: #1e293b; }
        h1 { margin-bottom: 25px; color: #0f172a; }
        
        /* สไตล์ปุ่มติดต่อ */
        .contact-item { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 12px; 
            background: #f1f5f9; 
            text-decoration: none; 
            color: #1e293b; 
            font-weight: 600;
            transition: 0.3s;
        }
        .contact-item:hover { background: #e2e8f0; transform: translateY(-3px); }
        .facebook { border-left: 5px solid #1877f2; }
        .phone { border-left: 5px solid #22c55e; }
        
        .btn-back { margin-top: 20px; display: inline-block; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="contact-card">
    <h1>ติดต่อเรา</h1>
    
    <a href="https://www.facebook.com/SmartQueueFitness" target="_blank" class="contact-item facebook">
        🔵 Facebook: SmartQueueFitness
    </a>

    <a href="tel:0890912425" class="contact-item phone">
        🟢 Tel: 089-091-2425
    </a>

    <div class="contact-item">
        📍 พิกัด: อาคารสันทนาการ ชั้น 2
    </div>

    <a href="index.html" class="btn-back">← กลับหน้าแรก</a>
</div>

</body>
</html>
