<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow Admin | ระบบจัดการหลังบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-100">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
            <h1 class="text-2xl font-bold mb-10 text-indigo-400"><i class="fas fa-user-shield mr-2"></i> Admin Panel</h1>
            <nav class="space-y-4">
                <a href="#" onclick="showSection('users')" class="block p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-users mr-2"></i> จัดการสมาชิก</a>
                <a href="#" onclick="showSection('equipments')" class="block p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-tools mr-2"></i> จัดการเครื่องเล่น</a>
                <a href="#" onclick="showSection('trainers')" class="block p-3 rounded-lg hover:bg-slate-800 transition"><i class="fas fa-user-tie mr-2"></i> จัดการเทรนเนอร์</a>
                <hr class="border-slate-700">
                <a href="index.html" class="block p-3 rounded-lg text-slate-400 hover:text-white"><i class="fas fa-arrow-left mr-2"></i> กลับหน้าหลัก</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <h2 id="section-title" class="text-3xl font-bold text-slate-800">จัดการสมาชิก</h2>
                <button onclick="openAddModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition">
                    <i class="fas fa-plus mr-2"></i> เพิ่มข้อมูลใหม่
                </button>
            </header>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr id="table-head">
                            </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // เช็คว่าเป็น Admin จริงไหม
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') {
            alert("สิทธิ์ไม่พอ! เฉพาะ Admin เท่านั้น");
            window.location.href = 'index.html';
        }

        let currentSection = 'users';

        async function loadData(section) {
            currentSection = section;
            const res = await fetch(`http://localhost:3000/api/admin/${section}`);
            const data = await res.json();
            renderTable(data);
        }

        function renderTable(data) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            if (currentSection === 'users') {
                head.innerHTML = `<th class="p-4">ID</th><th class="p-4">Username</th><th class="p-4">Role</th><th class="p-4">จัดการ</th>`;
                body.innerHTML = data.map(u => `
                    <tr>
                        <td class="p-4">${u.id}</td>
                        <td class="p-4 font-bold">${u.username}</td>
                        <td class="p-4"><span class="px-2 py-1 bg-blue-100 text-blue-600 rounded-md text-xs">${u.role}</span></td>
                        <td class="p-4"><button class="text-red-500 hover:underline" onclick="deleteItem(${u.id})">ลบ</button></td>
                    </tr>`).join('');
            } else if (currentSection === 'equipments') {
                head.innerHTML = `<th class="p-4">ID</th><th class="p-4">ชื่อเครื่องเล่น</th><th class="p-4">สถานะ</th><th class="p-4">จัดการ</th>`;
                body.innerHTML = data.map(e => `
                    <tr>
                        <td class="p-4">${e.id}</td>
                        <td class="p-4 font-bold">${e.name}</td>
                        <td class="p-4">${e.status}</td>
                        <td class="p-4"><button class="text-red-500 hover:underline" onclick="deleteItem(${e.id})">ลบ</button></td>
                    </tr>`).join('');
            }
        }

        async function deleteItem(id) {
            if(!confirm("ยืนยันการลบ?")) return;
            await fetch(`http://localhost:3000/api/admin/${currentSection}/${id}`, { method: 'DELETE' });
            loadData(currentSection);
        }

        function showSection(section) {
            document.getElementById('section-title').innerText = `จัดการ${section === 'users' ? 'สมาชิก' : section === 'equipments' ? 'เครื่องเล่น' : 'เทรนเนอร์'}`;
            loadData(section);
        }

        loadData('users'); // เริ่มต้นที่หน้าจัดการสมาชิก
    </script>
</body>
</html>
